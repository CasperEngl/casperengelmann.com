backend:
  name: github
  repo: casperengl/casperengelmann.com

media_folder: static/img
public_folder: /img

collections:
  - label: Pages
    name: pages
    files:
      - label: Home Page
        name: home
        file: content/home.md
        fields:
          - { label: Overskrift, name: headline, widget: string }
          - label: Body
            name: body
            widget: markdown